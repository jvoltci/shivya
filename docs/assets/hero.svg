<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
    <radialGradient id="node-genesis" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1F2937" />
      <stop offset="100%" stop-color="#111827" />
    </radialGradient>
    <radialGradient id="node-b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#2563EB" />
    </radialGradient>
    <radialGradient id="node-c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F472B6" />
      <stop offset="100%" stop-color="#DB2777" />
    </radialGradient>
    <radialGradient id="node-merge" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#4F46E5" />
    </radialGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9CA3AF" />
    </marker>
    <marker id="arrow-reconciled" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.08" />
    </filter>
  </defs>

  <rect width="800" height="400" rx="16" fill="url(#bg-grad)" />
  <path d="M 50,200 Q 200,100 400,200 T 750,200" fill="none" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="6,6" />
  <path d="M 50,230 Q 200,130 400,230 T 750,230" fill="none" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,4" />

  <polygon points="400,100 400,300 650,200" fill="rgba(79, 70, 229, 0.04)" stroke="rgba(79, 70, 229, 0.12)" stroke-width="1.5" stroke-dasharray="4,4" />

  <line x1="150" y1="200" x2="400" y2="100" stroke="#9CA3AF" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="150" y1="200" x2="400" y2="300" stroke="#9CA3AF" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="400" y1="300" x2="400" y2="100" stroke="#EF4444" stroke-width="2.5" stroke-dasharray="4,2" marker-end="url(#arrow)" />
  <line x1="400" y1="100" x2="650" y2="200" stroke="#10B981" stroke-width="3" marker-end="url(#arrow-reconciled)" />
  <line x1="400" y1="300" x2="650" y2="200" stroke="#10B981" stroke-width="3" marker-end="url(#arrow-reconciled)" />

  <circle cx="150" cy="200" r="20" fill="url(#node-genesis)" filter="url(#shadow)" />
  <text x="150" y="235" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="12" font-weight="600" fill="#374151">genesis</text>

  <circle cx="400" cy="100" r="20" fill="url(#node-b)" filter="url(#shadow)" />
  <text x="400" y="70" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="12" font-weight="600" fill="#374151">tx_B_1 (Offline)</text>

  <circle cx="400" cy="300" r="20" fill="url(#node-c)" filter="url(#shadow)" />
  <text x="400" y="335" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="12" font-weight="600" fill="#374151">tx_C_1 (Offline)</text>

  <circle cx="650" cy="200" r="20" fill="url(#node-merge)" filter="url(#shadow)" />
  <text x="650" y="235" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="12" font-weight="600" fill="#374151">tx_merge (Synced)</text>

  <rect x="250" y="185" width="300" height="30" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow)" />
  <text x="400" y="204" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#4F46E5">
    ΔS_reconciled = ΔS - d1^T * (L2^+ * d1 * ΔS)
  </text>
</svg>
